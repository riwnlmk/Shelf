<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <meta name="twitter:card" content="summary_large_image"/>

  <meta name="twitter:description" content="Moments captured through pages, screens and frames."/>

  <link rel="icon" type="image/x-icon" href="favicon/favicon.ico"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css">
</head>
<body>
  <div class="topbar" role="banner">
    <div class="topbar__inner">
      <a href="/Shelf" class="topbar__brand" aria-label="Home">
        <span class="topbar__brand-icon" aria-hidden="true">◈</span>
        <span class="topbar__brand-name">riwnlmk<span class="topbar__brand-accent">.shelf</span></span>
      </a>
      <div class="search-wrap" role="search">
        <i class="fa-solid fa-magnifying-glass search-wrap__icon" aria-hidden="true"></i>
        <input
          class="search-wrap__input"
          type="search"
          id="searchInput"
          placeholder="Posts, Books, Anime"
          aria-label="Search"
          autocomplete="off"
        />
        <kbd class="search-wrap__kbd" aria-hidden="true">/</kbd>
      </div>
    </div>
  </div>

  <main class="container">
    <header class="profile-card">
      <div class="avatar-wrap">
        <a href="/Shelf">
          <img src="assets/riwnlmk.png" alt="Md. Ridwanul Islam Muntakim" class="avatar"/>
        </a>
      </div>

      <div class="profile-info">
        <div class="name-row">
          <a href="/Shelf"><h1>riwnlmk</h1></a>
          <span class="pill">Shelf</span>
        </div>

        <p class="subtitle">
          Moments captured through pages, screens and frames.
        </p>

        <div class="social-icons">
          <a href="https://github.com/riwnlmk" target="_blank"><i class="fab fa-github"></i></a>
          <a href="mailto:riwnlmk@gmail.com"><i class="fas fa-envelope"></i></a>
          <a href="https://facebook.com/riwnlmk" target="_blank"><i class="fab fa-facebook-f"></i></a>
          <a href="https://t.me/riwnlmk" target="_blank"><i class="fab fa-telegram-plane"></i></a>
        </div>
      </div>
    </header>

    <section class="skills-section">
      <div class="skills-header">
        <div class="skills-title">
          <i class="fa-solid fa-code"></i>
          <span>Skills</span>
        </div>
      </div>

      <div class="skills-group">
        <h3>Languages</h3>
        <div class="skills-grid">
          <div class="skill-card">
            <img src="assets/icon/languages/python.svg">
            <span>Python</span>
          </div>

          <div class="skill-card">
            <img src="assets/icon/languages/javascript.svg">
            <span>JavaScript</span>
          </div>

          <div class="skill-card">
            <img src="assets/icon/languages/go.svg">
            <span>Go</span>
          </div>

          <div class="skill-card">
            <img src="assets/icon/languages/html.svg">
            <span>HTML</span>
          </div>

          <div class="skill-card">
            <img src="assets/icon/languages/css.svg">
            <span>CSS</span>
          </div>
        </div>
      </div>

      <div class="skills-group">
        <h3>Tools</h3>
        <div class="skills-grid">
          <div class="skill-card">
            <img src="assets/icon/tools/linux.svg">
            <span>Linux</span>
          </div>

          <div class="skill-card">
            <img src="assets/icon/tools/git.svg">
            <span>Git</span>
          </div>

          <div class="skill-card">
            <img src="assets/icon/tools/docker.svg">
            <span>Docker</span>
          </div>

          <div class="skill-card">
            <img src="assets/icon/tools/cloudflare.svg">
            <span>Cloudflare</span>
          </div>

          <div class="skill-card">
            <img src="assets/icon/tools/heroku.svg">
            <span>Heroku</span>
          </div>

          <div class="skill-card">
            <img src="assets/icon/tools/hugo.svg">
            <span>Hugo</span>
          </div>
        </div>
      </div>

      <div class="skills-group">
        <h3>Interests</h3>
        <div class="skills-grid">
          <div class="skill-card">
            <i class="fa-solid fa-shield-halved"></i>
            <span>Cyber Security</span>
          </div>

          <div class="skill-card">
            <i class="fa-solid fa-robot"></i>
            <span>Automation</span>
          </div>

          <div class="skill-card">
            <i class="fa-solid fa-code"></i>
            <span>Open Source</span>
          </div>

          <div class="skill-card">
            <i class="fa-solid fa-coins"></i>
            <span>Cryptocurrency</span>
          </div>
        </div>
      </div>
    </section>

    <section class="tabs">
      <nav class="tab-list" role="tablist">
        <button class="tab active" data-tab="timeline" aria-selected="true">
          Timeline
        </button>

        <button class="tab" data-tab="books" aria-selected="false">
          Books <span id="bookCount" class="count-badge">0</span>
        </button>

        <button class="tab" data-tab="anime" aria-selected="false">
          Anime <span id="animeCount" class="count-badge">0</span>
        </button>
      </nav>

      <div class="tab-panels">
        <div id="timeline" class="panel active"></div>
        <div id="books" class="panel"></div>
        <div id="anime" class="panel"></div>
      </div>
    </section>
    <div id="toast" class="toast"></div>
  </main>

  <div id="lightbox">
    <span class="close-btn">&times;</span>
    <img src="" alt="Preview">
  </div>

  <script src="js/dataLoader.js"></script>
  <script src="js/timeline.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>

</body>
</html>
